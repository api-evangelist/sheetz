description: >-
  Sheetz, Inc. is an American chain of convenience stores and coffee shops
  headquartered in Altoona, Pennsylvania. Operating more than 800 company-owned
  stores across Pennsylvania, West Virginia, Maryland, Ohio, Virginia, North
  Carolina, and Michigan, Sheetz is one of the largest convenience store chains
  in the United States. The company offers fuel, food service, coffee, and
  retail products, supported by a mobile app for ordering, rewards, and store
  locator services. Sheetz provides B2B EDI and API integration capabilities for
  suppliers and distribution partners.
